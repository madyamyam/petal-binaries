  linux-petal-x86_64:
    name: Petal (Linux x86_64)
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
    steps:
      - uses: actions/checkout@v7

      - name: Clone SDL
        uses: actions/checkout@v7
        with:
          repository: libsdl-org/SDL
          ref: release-3.4.x
          path: SDL

      - name: Clone SDL_shadercross
        uses: actions/checkout@v7
        with:
          repository: libsdl-org/SDL_shadercross
          submodules: recursive
          path: SDL_shadercross

      - name: Clone SDL_image
        uses: actions/checkout@v7
        with:
          repository: libsdl-org/SDL_image
          submodules: recursive
          path: SDL_image
          ref: release-3.4.x

      - name: Clone SDL_ttf
        uses: actions/checkout@v7
        with:
          repository: libsdl-org/SDL_ttf
          submodules: recursive
          path: SDL_ttf
          ref: release-3.2.x

      - name: Clone SDL_mixer
        uses: actions/checkout@v7
        with:
          repository: libsdl-org/SDL_mixer
          submodules: recursive
          path: SDL_mixer
          ref: release-3.2.x

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./build-linux-x86_64.sh

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: bin/linux-x86_64

